<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テレアポ実績管理</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#F5F5F5;color:#212121;min-height:100vh}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #E0E0E0;position:sticky;top:0;z-index:10;overflow-x:auto}
.tab{flex:0 0 auto;padding:13px 16px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:#9E9E9E;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.tab.active{color:#212121;border-bottom-color:#212121}
.page{display:none;padding:16px;max-width:520px;margin:0 auto}
.page.active{display:block}

/* Date nav */
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.date-btn{background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:18px;color:#616161;line-height:1}
.date-btn:active{background:#F5F5F5}
.date-label{flex:1;text-align:center;font-size:15px;font-weight:600}
.today-btn{background:none;border:1px solid #E0E0E0;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:11px;color:#757575;white-space:nowrap}

/* Counter */
.counter-card{background:#fff;border-radius:14px;padding:18px 20px;margin-bottom:12px;border:1px solid #EEEEEE}
.counter-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.counter-label{font-size:12px;font-weight:600;color:#9E9E9E;letter-spacing:.5px;text-transform:uppercase}
.counter-rate{font-size:12px;color:#9E9E9E;margin-top:4px}
.counter-num{font-size:48px;font-weight:300;line-height:1}
.counter-btns{display:flex;gap:8px}
.btn-plus{flex:1;padding:16px 0;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px;transition:transform .08s,filter .08s}
.btn-plus:active{transform:scale(.96);filter:brightness(.9)}
.shortcut-hint{text-align:center;font-size:11px;color:#BDBDBD;margin-top:6px;margin-bottom:8px}
.month-strip{border-radius:14px;padding:16px 20px;border:1px solid #EEEEEE;margin-top:4px}
.strip-title{font-size:11px;font-weight:600;color:#9E9E9E;letter-spacing:.7px;text-transform:uppercase;margin-bottom:12px}
.strip-grid{display:grid;grid-template-columns:repeat(5,1fr)}
.strip-item{text-align:center;padding:4px 0}
.strip-num{font-size:22px;font-weight:500}
.strip-lbl{font-size:10px;color:#9E9E9E;margin-top:3px}
.reset-btn{display:block;width:100%;margin-top:12px;padding:10px;background:none;border:1px dashed #E0E0E0;border-radius:10px;font-size:12px;color:#BDBDBD;cursor:pointer}
.reset-btn:hover{color:#EF5350;border-color:#EF5350}

/* Counter display-only (tsuden/apo) */
.counter-display{background:#FAFAFA;border-radius:14px;padding:14px 20px;margin-bottom:12px;border:1px solid #EEEEEE;display:flex;align-items:center;justify-content:space-between}
.counter-display-left{display:flex;flex-direction:column}
.counter-display-label{font-size:12px;font-weight:600;color:#9E9E9E;letter-spacing:.5px}
.counter-display-rate{font-size:11px;color:#BDBDBD;margin-top:2px}
.counter-display-num{font-size:36px;font-weight:300;line-height:1}

/* Dashboard */
.db-header{background:#212121;border-radius:14px;padding:16px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.db-title{font-size:16px;font-weight:700;color:#fff}
.db-sub{font-size:11px;color:#888;margin-top:3px}
.db-mgr-btn{background:rgba(255,255,255,.12);border:none;border-radius:10px;padding:8px 12px;color:#fff;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.db-mgr-btn:active{opacity:.8}
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.month-nav-btn{background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:16px;color:#616161}
.month-nav-label{flex:1;text-align:center;font-size:14px;font-weight:700}
.section-label{font-size:10px;font-weight:700;color:#9E9E9E;letter-spacing:.9px;text-transform:uppercase;margin-bottom:10px}

/* Ranking */
.ranking-card{background:#fff;border-radius:14px;padding:18px 20px;margin-bottom:14px;border:1px solid #EEEEEE}
.rank-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.rank-row:last-child{margin-bottom:0}
.rank-medal{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.rank-name{font-size:13px;font-weight:600;width:36px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis}
.rank-bar-wrap{flex:1;background:#F5F5F5;border-radius:6px;height:24px;overflow:hidden;position:relative}
.rank-bar{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;min-width:0}
.rank-val{font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
.rank-zero{font-size:12px;color:#BDBDBD;padding-left:8px}

/* Summary table */
.db-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #EEEEEE;margin-bottom:14px}
.db-table{width:100%;border-collapse:collapse}
.db-table th{font-size:10px;font-weight:700;color:#9E9E9E;padding:8px 8px;text-align:right;letter-spacing:.3px}
.db-table th:first-child{text-align:left}
.db-table td{padding:11px 8px;text-align:right;font-size:13px;border-bottom:1px solid #F5F5F5}
.db-table td:first-child{text-align:left;font-weight:600;font-size:13px}
.db-table tr:last-child td{border-bottom:none;font-weight:700;background:#FAFAFA}
.color-badge{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* Calendar */
.calendar-card{background:#fff;border-radius:14px;padding:14px;border:1px solid #EEEEEE;margin-bottom:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-hdr{text-align:center;font-size:10px;font-weight:700;color:#9E9E9E;padding:4px 0}
.cal-hdr.sun{color:#EF5350}
.cal-hdr.sat{color:#1E88E5}
.cal-cell{border-radius:8px;padding:4px 2px;text-align:center;cursor:pointer;transition:background .1s;min-height:52px;display:flex;flex-direction:column;align-items:center;gap:2px}
.cal-cell:hover{background:#F5F5F5}
.cal-cell.empty{cursor:default;pointer-events:none}
.cal-day{font-size:12px;font-weight:600;color:#424242;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.today .cal-day{background:#212121;color:#fff}
.cal-cell.sun .cal-day{color:#EF5350}
.cal-cell.sat .cal-day{color:#1E88E5}
.cal-cell.today .cal-day{color:#fff !important}
.cal-apo{font-size:14px;font-weight:700;color:#212121;line-height:1}
.cal-lbl{font-size:8px;color:#9E9E9E}
.cal-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;max-width:36px}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:520px;max-height:82vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:24px;color:#9E9E9E;cursor:pointer;line-height:1;padding:0 2px}

/* Day detail */
.day-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #F5F5F5}
.day-row:last-child{border-bottom:none}
.day-dot{width:10px;height:10px;border-radius:50%;margin-right:10px;flex-shrink:0}
.day-name{font-size:14px;font-weight:600;flex:1}
.day-nums{display:flex;gap:12px}
.day-num{text-align:center}
.day-val{font-size:16px;font-weight:600}
.day-lbl{font-size:9px;color:#9E9E9E}

/* Member manager */
.member-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #F5F5F5}
.member-row:last-child{border-bottom:none}
.member-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.member-nm{flex:1;font-size:15px;font-weight:600}
.del-btn{background:none;border:1px solid #E0E0E0;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;color:#9E9E9E}
.del-btn:hover{color:#EF5350;border-color:#EF5350}
.add-form{margin-top:16px;padding-top:16px;border-top:1px solid #F0F0F0}
.form-input{width:100%;padding:10px 12px;border:1px solid #E0E0E0;border-radius:10px;font-size:14px;margin-top:10px}
.color-picker-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.color-picker-input{width:48px;height:48px;border:none;border-radius:10px;cursor:pointer;padding:2px;background:#F5F5F5}
.color-code-input{flex:1;padding:10px 12px;border:1px solid #E0E0E0;border-radius:10px;font-size:14px;font-family:monospace;letter-spacing:.5px}
.color-preview{width:28px;height:28px;border-radius:50%;flex-shrink:0;border:2px solid #E0E0E0}
.add-btn{width:100%;padding:12px;background:#212121;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px}
.add-btn:active{opacity:.85}

/* Confirm modal */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px}
.confirm-overlay.hidden{display:none}
.confirm-box{background:#fff;border-radius:18px;padding:24px;max-width:320px;width:100%;text-align:center}
.confirm-icon{font-size:32px;margin-bottom:12px}
.confirm-msg{font-size:15px;font-weight:600;margin-bottom:6px}
.confirm-sub{font-size:12px;color:#9E9E9E;margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.confirm-yes{flex:1;padding:12px;background:#EF5350;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.confirm-yes:active{opacity:.85}
.confirm-no{flex:1;padding:12px;background:#F5F5F5;color:#616161;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.confirm-no:active{background:#EEEEEE}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#212121;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;white-space:nowrap;display:flex;align-items:center;gap:10px}
.toast.show{opacity:1;pointer-events:auto}
.toast-undo{background:none;border:1px solid rgba(255,255,255,.5);color:#fff;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.toast-undo:active{opacity:.7}
.online-dot{width:8px;height:8px;border-radius:50%;background:#9E9E9E;display:inline-block;margin-right:6px;vertical-align:middle}
.online-dot.on{background:#4CAF50}

/* Genre modal */
.genre-step{transition:opacity .15s}
.genre-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.genre-btn{padding:18px 12px;border:2px solid #E0E0E0;border-radius:14px;background:#fff;cursor:pointer;font-size:15px;font-weight:700;color:#212121;transition:all .12s;text-align:center}
.genre-btn:active{transform:scale(.96)}
.genre-btn.full{grid-column:1/-1}
.result-grid{display:flex;flex-direction:column;gap:10px}
.result-btn{padding:18px 20px;border:none;border-radius:14px;cursor:pointer;font-size:15px;font-weight:700;color:#fff;transition:transform .08s,filter .08s;text-align:left;display:flex;align-items:center;gap:12px}
.result-btn:active{transform:scale(.97);filter:brightness(.92)}
.result-btn .r-icon{font-size:22px}
.result-btn .r-text{display:flex;flex-direction:column}
.result-btn .r-label{font-size:15px;font-weight:700}
.result-btn .r-sub{font-size:11px;opacity:.8;font-weight:400;margin-top:2px}
.genre-back{background:none;border:none;color:#9E9E9E;font-size:13px;cursor:pointer;padding:4px 0;margin-bottom:12px;display:flex;align-items:center;gap:4px}
.selected-genre-badge{display:inline-block;background:#F0F0F0;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:600;color:#424242;margin-bottom:16px}

/* Graph */
.graph-card{background:#fff;border-radius:14px;border:1px solid #EEEEEE;margin-bottom:14px;padding:16px 20px}
.graph-tabs{display:flex;gap:6px;margin-bottom:12px}
.graph-tab{padding:6px 14px;border:1px solid #E0E0E0;border-radius:20px;background:#fff;font-size:12px;font-weight:600;color:#9E9E9E;cursor:pointer;transition:all .12s}
.graph-tab.active{background:#212121;color:#fff;border-color:#212121}
.graph-metrics{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.metric-btn{padding:5px 12px;border:1px solid #E0E0E0;border-radius:20px;background:#fff;font-size:11px;font-weight:600;color:#9E9E9E;cursor:pointer;transition:all .12s}
.metric-btn.active{background:#212121;color:#fff;border-color:#212121}
.graph-filter{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border:1.5px solid #E0E0E0;border-radius:20px;background:#fff;font-size:11px;font-weight:700;color:#9E9E9E;cursor:pointer;transition:all .12s}
.filter-btn.active{background:#212121;color:#fff;border-color:#212121}
</style>
</head>
<body>

<div class="tab-bar" id="tab-bar"></div>

<!-- ダッシュボード -->
<div class="page" id="page-db">
  <div class="db-header">
    <div>
      <div class="db-title"><span class="online-dot" id="online-dot"></span>テレアポ実績</div>
      <div class="db-sub" id="db-sub"></div>
    </div>
    <button class="db-mgr-btn" onclick="openManager()">＋ メンバー管理</button>
  </div>

  <div class="month-nav">
    <button class="month-nav-btn" onclick="shiftMonth(-1)">‹</button>
    <div class="month-nav-label" id="month-nav-lbl"></div>
    <button class="month-nav-btn" onclick="shiftMonth(1)">›</button>
  </div>

  <div class="section-label">🏆 アポ数ランキング</div>
  <div class="ranking-card" id="ranking-card"></div>

  <div class="section-label" style="margin-top:14px">📊 月間集計</div>
  <div class="db-card">
    <table class="db-table">
      <thead><tr><th>メンバー</th><th>架電</th><th>通電</th><th>アポ</th><th>通電率</th><th>アポ率</th></tr></thead>
      <tbody id="db-tbody"></tbody>
    </table>
  </div>

  <div class="section-label" style="margin-top:14px">🎯 職種別集計</div>
  <div class="db-card">
    <table class="db-table">
      <thead><tr><th>職種</th><th>架電</th><th>通電</th><th>アポ</th><th>通電率</th><th>アポ率</th></tr></thead>
      <tbody id="genre-tbody"></tbody>
    </table>
  </div>

  <div class="section-label" style="margin-top:14px">📈 推移グラフ</div>
  <div class="graph-card">
    <div class="graph-tabs">
      <button class="graph-tab active" id="gtab-daily" onclick="setGraphPeriod('daily')">日別（当月）</button>
      <button class="graph-tab" id="gtab-monthly" onclick="setGraphPeriod('monthly')">月別（12ヶ月）</button>
    </div>
    <div class="graph-metrics">
      <button class="metric-btn active" id="gm-kakuden" onclick="setGraphMetric('kakuden')">架電数</button>
      <button class="metric-btn" id="gm-tsuden" onclick="setGraphMetric('tsuden')">通電数</button>
      <button class="metric-btn" id="gm-apo" onclick="setGraphMetric('apo')">アポ数</button>
      <button class="metric-btn" id="gm-trate" onclick="setGraphMetric('trate')">通電率</button>
      <button class="metric-btn" id="gm-arate" onclick="setGraphMetric('arate')">アポ率</button>
    </div>
    <div class="graph-filter" id="graph-filter"></div>
    <div style="position:relative;height:220px">
      <canvas id="trend-chart"></canvas>
    </div>
  </div>

  <div class="section-label">📅 日別カレンダー</div>
  <div class="calendar-card">
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="section-label" style="margin-top:14px">📖 用語説明</div>
  <div style="background:#fff;border-radius:14px;border:1px solid #EEEEEE;padding:16px 20px;margin-bottom:14px;font-size:13px;line-height:1.7;color:#424242">
    <div style="margin-bottom:12px">
      <span style="font-weight:700;color:#212121">通電率（接続率）</span>とは、架電数のうち担当者・決裁者が実際に電話に出た件数の割合です。
    </div>
    <div style="background:#F5F5F5;border-radius:10px;padding:12px 14px;margin-bottom:10px">
      <div style="font-weight:700;margin-bottom:6px;font-size:12px;color:#9E9E9E;letter-spacing:.5px">✅ 通電にカウントされるケース</div>
      担当者・決裁者が実際に電話に出て、会話が成立した状態
    </div>
    <div style="background:#FFF3F3;border-radius:10px;padding:12px 14px">
      <div style="font-weight:700;margin-bottom:6px;font-size:12px;color:#EF5350;letter-spacing:.5px">❌ 通電にカウントしないケース</div>
      <div>・呼び出し音が鳴ったが誰も出なかった（不在）</div>
      <div>・自動音声・留守番電話のみ</div>
      <div>・受付が出たが担当者に繋がらなかった</div>
    </div>
  </div>
</div>

<!-- 日別詳細モーダル -->
<div class="modal-overlay hidden" id="modal-day" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal-sheet">
    <div class="modal-title">
      <span id="day-title"></span>
      <button class="modal-close" onclick="document.getElementById('modal-day').classList.add('hidden')">×</button>
    </div>
    <div id="day-body"></div>
  </div>
</div>

<!-- 職種・結果選択モーダル -->
<div class="modal-overlay hidden" id="modal-genre" onclick="if(event.target===this)closeGenreModal()">
  <div class="modal-sheet">
    <!-- ステップ1：職種選択 -->
    <div id="genre-step1">
      <div class="modal-title">
        <span>職種を選択</span>
        <button class="modal-close" onclick="closeGenreModal()">×</button>
      </div>
      <div class="genre-grid">
        <button class="genre-btn" onclick="selectGenre('IT')">💻 IT</button>
        <button class="genre-btn" onclick="selectGenre('営業')">📈 営業</button>
        <button class="genre-btn" onclick="selectGenre('建築')">🏗️ 建築</button>
        <button class="genre-btn" onclick="selectGenre('接客')">🛎️ 接客</button>
        <button class="genre-btn full" onclick="selectGenre('その他')">その他</button>
      </div>
    </div>
    <!-- ステップ2：結果選択 -->
    <div id="genre-step2" style="display:none">
      <div class="modal-title">
        <span>結果を選択</span>
        <button class="modal-close" onclick="closeGenreModal()">×</button>
      </div>
      <button class="genre-back" onclick="backToStep1()">‹ 職種を選び直す</button>
      <div id="selected-genre-disp" class="selected-genre-badge"></div>
      <div class="result-grid">
        <button class="result-btn" style="background:#78909C" onclick="recordCall('kakuden_only')">
          <span class="r-icon">📞</span>
          <span class="r-text"><span class="r-label">架電のみ</span><span class="r-sub">繋がらなかった</span></span>
        </button>
        <button class="result-btn" style="background:#42A5F5" onclick="recordCall('tsuden')">
          <span class="r-icon">🗣️</span>
          <span class="r-text"><span class="r-label">通電した</span><span class="r-sub">担当者・決裁者が実際に出た（自動応答・不在は×）</span></span>
        </button>
        <button class="result-btn" style="background:#66BB6A" onclick="recordCall('apo')">
          <span class="r-icon">🎉</span>
          <span class="r-text"><span class="r-label">アポ取れた！</span><span class="r-sub">商談確定</span></span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- メンバー管理モーダル -->
<div class="modal-overlay hidden" id="modal-mgr" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal-sheet">
    <div class="modal-title">
      メンバー管理
      <button class="modal-close" onclick="document.getElementById('modal-mgr').classList.add('hidden')">×</button>
    </div>
    <div id="member-list"></div>
    <div class="add-form">
      <div class="section-label">新しいメンバーを追加</div>

<script>
// ── 定数 ────────────────────────────────────────────────────
const GENRES = ['IT','営業','建築','接客','その他'];
const DEFAULT_MEMBERS=[{name:'三五',color:'#8BC34A'},{name:'中山',color:'#29B6F6'},{name:'藤田',color:'#F4511E'}];
const FB={
  apiKey:"AIzaSyCUspepcbxsyJ6JdRx6K0iT8XGXlB6ZKEo",

  projectId:"teleapo-tracker",
  storageBucket:"teleapo-tracker.firebasestorage.app",
  messagingSenderId:"385687074224",
  appId:"1:385687074224:web:145a788b51328f31eb5275"
};

// ── 状態 ────────────────────────────────────────────────────
let MEMBERS=[];
let db=null;
let activeTab='db';
let activeDates=[];
let listeners={};
let monthData={};   // {name:{kakuden,tsuden,apo}}
let genreMonthData={};// {name:{IT:{kakuden,tsuden,apo},...}}
let dailyData={};   // {name:{dateStr:{kakuden,tsuden,apo}}}
let viewMonth=new Date();
viewMonth.setDate(1);
let selColor='#8BC34A';
let membersReady=false;

// 職種モーダル用の一時状態
let _genreMi=null;
let _selectedGenre=null;

// ── ユーティリティ ────────────────────────────────────────
function dateKey(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function monthPfx(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function fmtDate(d){const days=['日','月','火','水','木','金','土'];return `${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;}
let toastT;
let _undoCb=null;
function toast(msg){const el=document.getElementById('toast');el.innerHTML=`<span>${msg}</span>`;el.classList.add('show');clearTimeout(toastT);_undoCb=null;toastT=setTimeout(()=>el.classList.remove('show'),1600);}
function toastWithUndo(msg,undoCb){
  const el=document.getElementById('toast');
  el.innerHTML=`<span>${msg}</span><button class="toast-undo" onclick="undoLast()">取り消す</button>`;
  el.classList.add('show');
  clearTimeout(toastT);
  _undoCb=undoCb;
  toastT=setTimeout(()=>{el.classList.remove('show');_undoCb=null;},5000);
}
function undoLast(){
  if(!_undoCb) return;
  _undoCb();_undoCb=null;
  clearTimeout(toastT);
  toast('取り消しました');
}

// ── UIビルド ────────────────────────────────────────────────
function buildUI(savedTab){
  if(trendChart){trendChart.destroy();trendChart=null;}
  graphFilter='all';
  document.querySelectorAll('.mpage').forEach(p=>p.remove());
  activeDates=MEMBERS.map(()=>new Date());
  const insertBefore=document.getElementById('modal-day');
  MEMBERS.forEach((m,mi)=>{
    const div=document.createElement('div');
    div.className='page mpage';
    div.id=`page-${mi}`;
    div.innerHTML=`
      <div class="date-nav">
        <button class="date-btn" onclick="chgDay(${mi},-1)">&#8249;</button>
        <div class="date-label" id="dlbl-${mi}"></div>
        <button class="today-btn" onclick="goToday(${mi})">今日</button>
        <button class="date-btn" onclick="chgDay(${mi},+1)">&#8250;</button>
      </div>

      <!-- 架電カード（ボタン付き） -->
      <div class="counter-card">
        <div class="counter-top">
          <div><div class="counter-label">架電数</div></div>
          <div class="counter-num" style="color:${m.color}" id="num-${mi}-0">0</div>
        </div>
        <div class="counter-btns">
          <button class="btn-plus" style="background:${m.color}" onclick="openGenreModal(${mi})">+1　架電</button>
        </div>
      </div>

      <!-- 通電カード（表示のみ） -->
      <div class="counter-display">
        <div class="counter-display-left">
          <div class="counter-display-label">通電数</div>
          <div class="counter-display-rate" id="rate-${mi}-1"></div>
        </div>
        <div class="counter-display-num" style="color:${m.color}" id="num-${mi}-1">0</div>
      </div>

      <!-- アポカード（表示のみ） -->
      <div class="counter-display">
        <div class="counter-display-left">
          <div class="counter-display-label">アポ数</div>
          <div class="counter-display-rate" id="rate-${mi}-2"></div>
        </div>
        <div class="counter-display-num" style="color:${m.color}" id="num-${mi}-2">0</div>
      </div>

      <div class="shortcut-hint">Q キーで架電モーダルを開く</div>

      <div class="month-strip" style="background:${m.color}18;border-color:${m.color}30">
        <div style="padding:16px 20px">
          <div class="strip-title">月間合計 <span style="font-weight:400;color:#9E9E9E" id="strip-month-${mi}"></span></div>
          <div class="strip-grid">
            ${['kakuden','tsuden','apo','trate','arate'].map((k,i)=>`
            <div class="strip-item">
              <div class="strip-num" style="color:${m.color}" id="m-${k}-${mi}">0</div>
              <div class="strip-lbl">${['架電','通電','アポ','通電率','アポ率'][i]}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>
      <button class="reset-btn" onclick="resetDay(${mi})">本日のデータをリセット</button>
    `;
    document.body.insertBefore(div,insertBefore);
  });
  buildTabs();
  monthData={};dailyData={};genreMonthData={};
  MEMBERS.forEach(m=>{
    monthData[m.name]={kakuden:0,tsuden:0,apo:0};
    dailyData[m.name]={};
    genreMonthData[m.name]=initGenreObj();
  });
  const target=(savedTab==='db'||savedTab===undefined)?'db'
    :(typeof savedTab==='number'&&savedTab<MEMBERS.length)?savedTab:'db';
  showTab(target);
}

function initGenreObj(){
  const o={};
  GENRES.forEach(g=>o[g]={kakuden:0,tsuden:0,apo:0});
  return o;
}

function buildTabs(){
  const bar=document.getElementById('tab-bar');
  bar.innerHTML='';
  [['ダッシュボード','db'],...MEMBERS.map((m,i)=>[m.name,i,m.color])].forEach(item=>{
    const t=document.createElement('div');
    t.className='tab';
    t.textContent=item[0];
    const id=item[1];
    if(id===activeTab) t.classList.add('active');
    if(id!=='db'){
      t.style.cssText=`--c:${item[2]}`;
      if(id===activeTab) t.style.cssText+=`;color:${item[2]};border-bottom-color:${item[2]}`;
    }
    t.onclick=()=>showTab(id);
    bar.appendChild(t);
  });
}

// ── Firebaseメンバー監視 ──────────────────────────────────
function watchMembers(){
  db.ref('/config/members').on('value',snap=>{
    const val=snap.val();
    let arr=[];
    if(val){
      arr=Object.values(val).sort((a,b)=>(a.order||0)-(b.order||0));
    }
    if(arr.length===0){
      DEFAULT_MEMBERS.forEach((m,i)=>db.ref(`/config/members/${m.name}`).set({...m,order:i}));
      return;
    }
    const prev=activeTab;
    MEMBERS=arr.map(m=>({name:m.name,color:m.color}));
    buildUI(prev);
    startListeners();
    membersReady=true;
  });
}

// ── データリスナー ──────────────────────────────────────
function startListeners(){
  Object.values(listeners).forEach(l=>l.ref&&l.ref.off('value',l.fn));
  listeners={};
  MEMBERS.forEach((_,mi)=>watchMonth(mi));
  if(typeof activeTab==='number') watchDay(activeTab);
}

function watchDay(mi){
  const k=`day-${mi}`;
  if(listeners[k]){listeners[k].ref.off('value',listeners[k].fn);}
  if(!db||mi>=MEMBERS.length) return;
  const m=MEMBERS[mi];
  const ref=db.ref(`/members/${m.name}/${dateKey(activeDates[mi])}`);
  const fn=snap=>{
    const v=snap.val()||{};
    const el=document.getElementById(`num-${mi}-0`);
    if(!el) return;
    document.getElementById(`num-${mi}-0`).textContent=v.kakuden||0;
    document.getElementById(`num-${mi}-1`).textContent=v.tsuden||0;
    document.getElementById(`num-${mi}-2`).textContent=v.apo||0;
    const kk=v.kakuden||0,t=v.tsuden||0,a=v.apo||0;
    document.getElementById(`rate-${mi}-1`).textContent=kk>0?'通電率 '+(t/kk*100).toFixed(1)+'%':'';
    document.getElementById(`rate-${mi}-2`).textContent=kk>0?'アポ率 '+(a/kk*100).toFixed(1)+'%':'';
  };
  ref.on('value',fn);
  listeners[k]={ref,fn};
}

function watchMonth(mi){
  const k=`mon-${mi}`;
  if(listeners[k]){listeners[k].ref.off('value',listeners[k].fn);}
  if(!db||mi>=MEMBERS.length) return;
  const m=MEMBERS[mi];
  const pfx=monthPfx(viewMonth);
  const ref=db.ref(`/members/${m.name}`).orderByKey().startAt(pfx).endAt(pfx+'~');
  const fn=snap=>{
    let kk=0,t=0,a=0;
    const daily={};
    const genre=initGenreObj();
    snap.forEach(c=>{
      const v=c.val()||{};
      kk+=v.kakuden||0;t+=v.tsuden||0;a+=v.apo||0;
      daily[c.key]={kakuden:v.kakuden||0,tsuden:v.tsuden||0,apo:v.apo||0};
      // 職種別集計
      if(v.genre){
        Object.entries(v.genre).forEach(([g,gv])=>{
          if(genre[g]){
            genre[g].kakuden+=(gv.kakuden||0);
            genre[g].tsuden+=(gv.tsuden||0);
            genre[g].apo+=(gv.apo||0);
          }
        });
      }
    });
    monthData[m.name]={kakuden:kk,tsuden:t,apo:a};
    dailyData[m.name]=daily;
    genreMonthData[m.name]=genre;
    const el=document.getElementById(`m-kakuden-${mi}`);
    if(el){
      document.getElementById(`m-kakuden-${mi}`).textContent=kk;
      document.getElementById(`m-tsuden-${mi}`).textContent=t;
      document.getElementById(`m-apo-${mi}`).textContent=a;
      document.getElementById(`m-trate-${mi}`).textContent=kk>0?(t/kk*100).toFixed(1)+'%':'—';
      document.getElementById(`m-arate-${mi}`).textContent=kk>0?(a/kk*100).toFixed(1)+'%':'—';
      const sl=document.getElementById(`strip-month-${mi}`);
      if(sl) sl.textContent=`${viewMonth.getFullYear()}年${viewMonth.getMonth()+1}月`;
    }
    if(activeTab==='db') renderDB();
  };
  ref.on('value',fn);
  listeners[k]={ref,fn};
}

// ── 職種モーダル ──────────────────────────────────────────
function openGenreModal(mi){
  _genreMi=mi;
  _selectedGenre=null;
  document.getElementById('genre-step1').style.display='block';
  document.getElementById('genre-step2').style.display='none';
  document.getElementById('modal-genre').classList.remove('hidden');
}

function closeGenreModal(){
  document.getElementById('modal-genre').classList.add('hidden');
  _genreMi=null;
  _selectedGenre=null;
}

function selectGenre(genre){
  _selectedGenre=genre;
  document.getElementById('genre-step1').style.display='none';
  document.getElementById('genre-step2').style.display='block';
  document.getElementById('selected-genre-disp').textContent=genre;
}

function backToStep1(){
  _selectedGenre=null;
  document.getElementById('genre-step1').style.display='block';
  document.getElementById('genre-step2').style.display='none';
}

function recordCall(result){
  if(_genreMi===null||!_selectedGenre||!db) return;
  const mi=_genreMi;
  const genre=_selectedGenre;
  const m=MEMBERS[mi];
  const dk=dateKey(activeDates[mi]);
  const base=db.ref(`/members/${m.name}/${dk}`);
  // 架電数+1
  base.child('kakuden').transaction(c=>Math.max(0,(c||0)+1));
  base.child(`genre/${genre}/kakuden`).transaction(c=>Math.max(0,(c||0)+1));
  // 通電
  if(result==='tsuden'||result==='apo'){
    base.child('tsuden').transaction(c=>Math.max(0,(c||0)+1));
    base.child(`genre/${genre}/tsuden`).transaction(c=>Math.max(0,(c||0)+1));
  }
  // アポ
  if(result==='apo'){
    base.child('apo').transaction(c=>Math.max(0,(c||0)+1));
    base.child(`genre/${genre}/apo`).transaction(c=>Math.max(0,(c||0)+1));
  }
  const label=result==='apo'?'🎉 アポ取れた！':result==='tsuden'?'🗣️ 通電 +1':'📞 架電 +1';
  const undoCb=()=>{
    base.child('kakuden').transaction(c=>Math.max(0,(c||0)-1));
    base.child(`genre/${genre}/kakuden`).transaction(c=>Math.max(0,(c||0)-1));
    if(result==='tsuden'||result==='apo'){
      base.child('tsuden').transaction(c=>Math.max(0,(c||0)-1));
      base.child(`genre/${genre}/tsuden`).transaction(c=>Math.max(0,(c||0)-1));
    }
    if(result==='apo'){
      base.child('apo').transaction(c=>Math.max(0,(c||0)-1));
      base.child(`genre/${genre}/apo`).transaction(c=>Math.max(0,(c||0)-1));
    }
  };
  toastWithUndo(`[${genre}] ${label}`,undoCb);
  closeGenreModal();
}

function resetDay(mi){
  if(!db) return;
  openConfirm(
    `${MEMBERS[mi].name}さんの本日データをリセット`,
    `${fmtDate(activeDates[mi])} の\n架電・通電・アポをすべて 0 に戻します`,
    ()=>{
      db.ref(`/members/${MEMBERS[mi].name}/${dateKey(activeDates[mi])}`).set({kakuden:0,tsuden:0,apo:0,genre:{}});
      toast('リセットしました');
    }
  );
}

// ── グラフ ──────────────────────────────────────────────────
let graphPeriod='daily';
let graphMetric='kakuden';
let graphFilter='all';
let trendChart=null;
let monthlyCache={};

function setGraphPeriod(p){
  graphPeriod=p;
  document.getElementById('gtab-daily').classList.toggle('active',p==='daily');
  document.getElementById('gtab-monthly').classList.toggle('active',p==='monthly');
  if(p==='monthly') loadMonthlyAndRender();
  else renderGraph();
}
function setGraphMetric(m){
  graphMetric=m;
  ['kakuden','tsuden','apo','trate','arate'].forEach(k=>{
    const el=document.getElementById(`gm-${k}`);
    if(el) el.classList.toggle('active',k===m);
  });
  renderGraph();
}
function setGraphFilter(f){
  graphFilter=f;
  buildFilterUI();
  renderGraph();
}
function buildFilterUI(){
  const el=document.getElementById('graph-filter');
  if(!el) return;
  const all=`<button class="filter-btn${graphFilter==='all'?' active':''}" onclick="setGraphFilter('all')">全員</button>`;
  const members=MEMBERS.map(m=>{
    const active=graphFilter===m.name;
    return `<button class="filter-btn" style="${active?`background:${m.color};color:#fff;border-color:${m.color}`:`color:${m.color};border-color:${m.color}99`}" onclick="setGraphFilter('${m.name}')">${m.name}</button>`;
  });
  el.innerHTML=[all,...members].join('');
}
function getMetricVal(d,metric){
  if(!d) return 0;
  if(metric==='trate') return d.kakuden>0?+(d.tsuden/d.kakuden*100).toFixed(1):0;
  if(metric==='arate') return d.kakuden>0?+(d.apo/d.kakuden*100).toFixed(1):0;
  return d[metric]||0;
}
function buildDatasets(labels,getDataFn){
  const isRate=(graphMetric==='trate'||graphMetric==='arate');
  const datasets=[];
  const targets=graphFilter==='all'?MEMBERS:MEMBERS.filter(m=>m.name===graphFilter);
  targets.forEach(m=>{
    datasets.push({
      label:m.name,
      data:labels.map((_,i)=>getMetricVal(getDataFn(m.name,i),graphMetric)),
      borderColor:m.color,backgroundColor:m.color+'22',
      borderWidth:2,pointRadius:3,tension:.3,fill:false
    });
  });
  if(graphFilter==='all'&&MEMBERS.length>1){
    const totalData=labels.map((_,i)=>{
      if(isRate){
        let tk=0,tv=0;
        MEMBERS.forEach(m=>{const d=getDataFn(m.name,i)||{};tk+=d.kakuden||0;tv+=(graphMetric==='trate'?d.tsuden:d.apo)||0;});
        return tk>0?+(tv/tk*100).toFixed(1):0;
      }
      return MEMBERS.reduce((s,m)=>s+getMetricVal(getDataFn(m.name,i),graphMetric),0);
    });
    datasets.push({
      label:'合計',data:totalData,
      borderColor:'#212121',backgroundColor:'transparent',
      borderWidth:2.5,borderDash:[5,4],pointRadius:3,tension:.3,fill:false
    });
  }
  return datasets;
}
function renderGraph(){
  const canvas=document.getElementById('trend-chart');
  if(!canvas) return;
  buildFilterUI();
  const metricLabel={kakuden:'架電数',tsuden:'通電数',apo:'アポ数',trate:'通電率（%）',arate:'アポ率（%）'}[graphMetric];
  let labels=[],datasets=[];
  if(graphPeriod==='daily'){
    const y=viewMonth.getFullYear(),mo=viewMonth.getMonth();
    const last=new Date(y,mo+1,0).getDate();
    for(let d=1;d<=last;d++) labels.push(`${d}`);
    datasets=buildDatasets(labels,(name,i)=>{
      const dk=`${y}-${String(mo+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`;
      return dailyData[name]&&dailyData[name][dk];
    });
  } else {
    for(let i=11;i>=0;i--){
      const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);
      labels.push(`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`);
    }
    datasets=buildDatasets(labels,(name,i)=>monthlyCache[labels[i]]&&monthlyCache[labels[i]][name]);
  }
  if(trendChart){
    trendChart.data.labels=labels;
    trendChart.data.datasets=datasets;
    trendChart.options.scales.y.title.text=metricLabel;
    trendChart.update('none');
  } else {
    trendChart=new Chart(canvas.getContext('2d'),{
      type:'line',data:{labels,datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12,padding:8}}},
        scales:{
          x:{ticks:{font:{size:10},maxRotation:45},grid:{display:false}},
          y:{title:{display:true,text:metricLabel,font:{size:10}},ticks:{font:{size:10}},beginAtZero:true}
        },
        animation:{duration:200}
      }
    });
  }
}
async function loadMonthlyAndRender(){
  const promises=[];
  for(let i=11;i>=0;i--){
    const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);
    const pfx=monthPfx(d);
    MEMBERS.forEach(m=>{
      promises.push(
        db.ref(`/members/${m.name}`).orderByKey().startAt(pfx).endAt(pfx+'~')
          .once('value').then(snap=>{
            let kk=0,t=0,a=0;
            snap.forEach(c=>{const v=c.val()||{};kk+=v.kakuden||0;t+=v.tsuden||0;a+=v.apo||0;});
            if(!monthlyCache[pfx]) monthlyCache[pfx]={};
            monthlyCache[pfx][m.name]={kakuden:kk,tsuden:t,apo:a};
          })
      );
    });
  }
  await Promise.all(promises);
  renderGraph();
}

// ── ダッシュボード描画 ──────────────────────────────────────
function renderDB(){
  const y=viewMonth.getFullYear(),mo=viewMonth.getMonth()+1;
  document.getElementById('month-nav-lbl').textContent=`${y}年${mo}月`;
  document.getElementById('db-sub').textContent=`${y}年${mo}月`;
  renderRanking();
  renderTable();
  renderGenreTable();
  if(graphPeriod==='daily') renderGraph();
  renderCal();
}

function renderRanking(){
  const ranked=[...MEMBERS].map(m=>({...m,apo:monthData[m.name]?monthData[m.name].apo:0}))
    .sort((a,b)=>b.apo-a.apo);
  const maxApo=Math.max(...ranked.map(r=>r.apo),1);
  const medals=['🥇','🥈','🥉'];
  const html=ranked.map((r,i)=>{
    const pct=maxApo>0?Math.max((r.apo/maxApo)*100,0):0;
    const showIn=pct>=15;
    return `<div class="rank-row">
      <div class="rank-medal">${i<3?medals[i]:`${i+1}`}</div>
      <div class="rank-name">${r.name}</div>
      <div class="rank-bar-wrap">
        <div class="rank-bar" style="width:${pct}%;background:${r.color}">
          ${showIn&&r.apo>0?`<span class="rank-val">${r.apo}件</span>`:''}
        </div>
        ${!showIn?`<span class="rank-zero">${r.apo}件</span>`:''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('ranking-card').innerHTML=html||'<div style="color:#9E9E9E;text-align:center;padding:12px;font-size:13px">データなし</div>';
}

function renderTable(){
  let tK=0,tT=0,tA=0,html='';
  MEMBERS.forEach(m=>{
    const d=monthData[m.name]||{kakuden:0,tsuden:0,apo:0};
    tK+=d.kakuden;tT+=d.tsuden;tA+=d.apo;
    html+=`<tr>
      <td><span class="color-badge" style="background:${m.color}"></span>${m.name}</td>
      <td>${d.kakuden}</td><td>${d.tsuden}</td><td>${d.apo}</td>
      <td>${d.kakuden>0?(d.tsuden/d.kakuden*100).toFixed(1)+'%':'—'}</td>
      <td>${d.kakuden>0?(d.apo/d.kakuden*100).toFixed(1)+'%':'—'}</td>
    </tr>`;
  });
  html+=`<tr><td>合計</td><td>${tK}</td><td>${tT}</td><td>${tA}</td>
    <td>${tK>0?(tT/tK*100).toFixed(1)+'%':'—'}</td>
    <td>${tK>0?(tA/tK*100).toFixed(1)+'%':'—'}</td></tr>`;
  document.getElementById('db-tbody').innerHTML=html;
}

function renderGenreTable(){
  // 全メンバーの職種別データを合計
  const total=initGenreObj();
  MEMBERS.forEach(m=>{
    const gd=genreMonthData[m.name]||initGenreObj();
    GENRES.forEach(g=>{
      total[g].kakuden+=(gd[g]||{kakuden:0}).kakuden;
      total[g].tsuden+=(gd[g]||{tsuden:0}).tsuden;
      total[g].apo+=(gd[g]||{apo:0}).apo;
    });
  });
  let tK=0,tT=0,tA=0,html='';
  GENRES.forEach(g=>{
    const d=total[g];
    tK+=d.kakuden;tT+=d.tsuden;tA+=d.apo;
    html+=`<tr>
      <td>${g}</td>
      <td>${d.kakuden}</td><td>${d.tsuden}</td><td>${d.apo}</td>
      <td>${d.kakuden>0?(d.tsuden/d.kakuden*100).toFixed(1)+'%':'—'}</td>
      <td>${d.kakuden>0?(d.apo/d.kakuden*100).toFixed(1)+'%':'—'}</td>
    </tr>`;
  });
  html+=`<tr><td>合計</td><td>${tK}</td><td>${tT}</td><td>${tA}</td>
    <td>${tK>0?(tT/tK*100).toFixed(1)+'%':'—'}</td>
    <td>${tK>0?(tA/tK*100).toFixed(1)+'%':'—'}</td></tr>`;
  document.getElementById('genre-tbody').innerHTML=html;
}

function renderCal(){
  const y=viewMonth.getFullYear(),mo=viewMonth.getMonth();
  const first=new Date(y,mo,1);
  const last=new Date(y,mo+1,0);
  const todayStr=dateKey(new Date());
  const hdrs=['日','月','火','水','木','金','土'];
  let html=hdrs.map((d,i)=>`<div class="cal-hdr${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('');
  for(let i=0;i<first.getDay();i++) html+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=last.getDate();day++){
    const d=new Date(y,mo,day);
    const dk=dateKey(d);
    const dow=d.getDay();
    let totalApo=0;
    const dots=[];
    MEMBERS.forEach(m=>{
      const v=dailyData[m.name]&&dailyData[m.name][dk];
      if(v&&v.apo>0){totalApo+=v.apo;dots.push(m.color);}
    });
    const cls=['cal-cell',dk===todayStr?'today':'',dow===0?'sun':'',dow===6?'sat':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="openDay('${dk}')">
      <div class="cal-day">${day}</div>
      ${totalApo>0?`<div class="cal-apo">${totalApo}</div><div class="cal-lbl">アポ</div>`:''}
      ${dots.length>0?`<div class="cal-dots">${dots.map(c=>`<div class="cal-dot" style="background:${c}"></div>`).join('')}</div>`:''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

// ── 日別詳細 ────────────────────────────────────────────────
function openDay(dk){
  const [dy,dm,dd]=dk.split('-').map(Number);
  const d=new Date(dy,dm-1,dd);
  document.getElementById('day-title').textContent=fmtDate(d);
  const html=MEMBERS.map(m=>{
    const v=(dailyData[m.name]&&dailyData[m.name][dk])||{kakuden:0,tsuden:0,apo:0};
    const ar=v.kakuden>0?(v.apo/v.kakuden*100).toFixed(1)+'%':'—';
    const tr=v.kakuden>0?(v.tsuden/v.kakuden*100).toFixed(1)+'%':'—';
    return `<div class="day-row">
      <div class="day-dot" style="background:${m.color}"></div>
      <div class="day-name">${m.name}</div>
      <div class="day-nums">
        <div class="day-num"><div class="day-val">${v.kakuden}</div><div class="day-lbl">架電</div></div>
        <div class="day-num"><div class="day-val">${v.tsuden}</div><div class="day-lbl">通電</div></div>
        <div class="day-num"><div class="day-val" style="color:${m.color};font-weight:700">${v.apo}</div><div class="day-lbl">アポ</div></div>
        <div class="day-num"><div class="day-val" style="font-size:13px">${ar}</div><div class="day-lbl">アポ率</div></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('day-body').innerHTML=html;
  document.getElementById('modal-day').classList.remove('hidden');
}

// ── メンバー管理 ──────────────────────────────────────────
function openManager(){
  const html=MEMBERS.map(m=>`<div class="member-row">
    <label title="クリックして色を変更" style="cursor:pointer;flex-shrink:0;position:relative;width:18px;height:18px;border-radius:50%;display:block">
      <div id="mdot-${m.name}" style="width:18px;height:18px;border-radius:50%;background:${m.color};pointer-events:none;border:2px solid rgba(0,0,0,.08)"></div>
      <input type="color" value="${m.color}" style="position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;border:none;padding:0" onchange="changeMemberColor('${m.name}',this.value)">
    </label>
    <div class="member-nm">${m.name}</div>
    <button class="del-btn" onclick="delMember('${m.name}')">削除</button>
  </div>`).join('');
  document.getElementById('member-list').innerHTML=html||'<div style="color:#9E9E9E;font-size:13px;padding:8px 0">メンバーがいません</div>';
  document.getElementById('new-name').value='';
  document.getElementById('modal-mgr').classList.remove('hidden');
}
function changeMemberColor(name,color){
  db.ref(`/config/members/${name}/color`).set(color);
  const dot=document.getElementById(`mdot-${name}`);
  if(dot) dot.style.background=color;
  toast(`${name}さんの色を変更しました`);
}
function onPickerChange(val){
  selColor=val;
  document.getElementById('color-code').value=val;
  document.getElementById('color-preview').style.background=val;
}
function onCodeChange(val){
  const v=val.startsWith('#')?val:'#'+val;
  document.getElementById('color-preview').style.background=v;
  if(/^#[0-9A-Fa-f]{6}$/.test(v)){
    selColor=v;
    document.getElementById('color-picker').value=v;
  }
}
function addMember(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){toast('名前を入力してください');return;}
  if(MEMBERS.find(m=>m.name===name)){toast('同名のメンバーがいます');return;}
  db.ref(`/config/members/${name}`).set({name,color:selColor,order:MEMBERS.length});
  document.getElementById('modal-mgr').classList.add('hidden');
  toast(`${name}さんを追加しました`);
}
function delMember(name){
  document.getElementById('modal-mgr').classList.add('hidden');
  openConfirm(
    `${name}さんを削除しますか？`,
    '実績データは残ります。\nメンバーリストから取り除かれます。',
    ()=>{
      db.ref(`/config/members/${name}`).remove();
      toast(`${name}さんを削除しました`);
    }
  );
}

// ── 確認モーダル ──────────────────────────────────────────
let _confirmCb=null;
function openConfirm(msg,sub,cb){
  _confirmCb=cb;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-sub').textContent=sub;
  document.getElementById('modal-confirm').classList.remove('hidden');
}
function confirmYes(){
  document.getElementById('modal-confirm').classList.add('hidden');
  if(_confirmCb){_confirmCb();_confirmCb=null;}
}
function confirmCancel(){
  document.getElementById('modal-confirm').classList.add('hidden');
  _confirmCb=null;
}

// ── 月移動 ────────────────────────────────────────────────
function shiftMonth(d){
  viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+d,1);
  monthlyCache={};
  MEMBERS.forEach(m=>{
    monthData[m.name]={kakuden:0,tsuden:0,apo:0};
    dailyData[m.name]={};
    genreMonthData[m.name]=initGenreObj();
  });
  MEMBERS.forEach((_,mi)=>watchMonth(mi));
  renderDB();
}

// ── ナビゲーション ────────────────────────────────────────
function showTab(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  activeTab=id;
  buildTabs();
  if(id==='db'){
    document.getElementById('page-db').classList.add('active');
    renderDB();
  } else {
    const pg=document.getElementById(`page-${id}`);
    if(pg) pg.classList.add('active');
    activeDates[id]=activeDates[id]||new Date();
    const el=document.getElementById(`dlbl-${id}`);
    if(el) el.textContent=fmtDate(activeDates[id]);
    watchDay(id);
  }
}
function chgDay(mi,d){
  const nd=new Date(activeDates[mi]);nd.setDate(nd.getDate()+d);activeDates[mi]=nd;
  document.getElementById(`dlbl-${mi}`).textContent=fmtDate(nd);
  watchDay(mi);
}
function goToday(mi){
  activeDates[mi]=new Date();
  document.getElementById(`dlbl-${mi}`).textContent=fmtDate(activeDates[mi]);
  watchDay(mi);
}

// ── キーボードショートカット ────────────────────────────────
document.addEventListener('keydown',e=>{
  if(typeof activeTab!=='number') return;
  const k=e.key.toUpperCase();
  if(k==='Q') openGenreModal(activeTab);
});
